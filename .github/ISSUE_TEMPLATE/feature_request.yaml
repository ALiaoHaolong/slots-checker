name: ✨ Feature Request
description: Suggest an idea for this project
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
assignees:
  -  ALiaoHaolong

body:
  - type: markdown
    attributes:
      value: |
        **Thank you for your suggestions for the project!**
        Please describe your ideas in detail. This will help us understand your needs.

  - type: textarea
    attributes:
      label: Is your feature request related to a problem? Please describe.
      description: A clear and concise description of what the problem is. Ex. I'm always frustrated when [...]
    validations:
      required: true

  - type: textarea
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen.
    validations:
      required: false

  - type: textarea
    attributes:
      label: Describe alternatives you've considered
      description: A clear and concise description of any alternative solutions or features you've considered.
    validations:
      required: false

  - type: textarea
    attributes:
      label: Additional context
      description: Add any other context or screenshots about the feature request here.
    validations:
      required: false

  - type: checkboxes
    attributes:
      label: Confirmation before submission
      description: Please ensure that the following checks have been completed.
      options:
        - label: I have searched the existing Issues and found no duplicate suggestions.
          required: true
        - label: I have reviewed the project documentation and confirmed that no existing functions can meet the requirements.
          required: false
