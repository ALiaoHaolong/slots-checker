import pers.liaohaolong.modrinthpublisher.ModrinthTask

plugins {
    id 'java'
    id 'pers.liaohaolong.modrinth-publisher'
}

repositories {
    mavenCentral()
}

support {
    versions {
        v1 {
            versions "1.18", "1.18.1", "1.18.2"
        }
        v2 {
            versions "1.19", "1.19.1", "1.19.2", "1.19.3", "1.19.4",
                    "1.20", "1.20.1", "1.20.2", "1.20.3", "1.20.4", "1.20.5", "1.20.6",
                    "1.21", "1.21.1", "1.21.2", "1.21.3", "1.21.4", "1.21.5", "1.21.6", "1.21.7", "1.21.8", "1.21.9", "1.21.10"
        }
        v3 {
            versions "1.21.11"
        }
        v4 {
            versions "26.1"
        }
    }
}

modrinth {
    token = providers.environmentVariable("MODRINTH_TOKEN")
    projectId = project.modrinth_id
    description = providers.fileContents(layout.projectDirectory.file("docs/modrinth/README.md")).asText
    debugMode = true
}

support.versions.forEach {version -> {
    tasks.register("modrinth-${version.name}", ModrinthTask) {
        group("publish")
        gameVersions = version.versions
        versionNumber = provider { "fabric-${project.mod_version}-mc${getGameVersions().get().getFirst()}".toString() }
        versionName = provider { "${project.mod_name} ${project.mod_version} for Fabric ${getGameVersions().get().getFirst()}".toString() }
        primaryFile = provider { layout.projectDirectory.file("build/libs/${project.mod_id}-fabric-${project.mod_version}-mc${getGameVersions().get().getFirst()}.jar") }
        additionalFiles {
            sourcesJar provider { layout.projectDirectory.file("build/libs/${project.mod_id}-fabric-${project.mod_version}-mc${getGameVersions().get().getFirst()}-sources.jar") } as Provider<RegularFile>
        }
        changelog = providers.fileContents(layout.projectDirectory.file("docs/changelogs/${project.mod_version}.md")).asText
        versionType = "release"
        loaders = ["fabric"]
        dependencies {
            required "fabric-api"
        }
    }
}}
